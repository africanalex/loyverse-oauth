<!DOCTYPE html>
<html>
<head>
    <title>FiscalPOS OAuth Redirect</title>
    <script>
        // Extract the authorization code from URL
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const state = urlParams.get('state');
        const error = urlParams.get('error');
        
        if (code) {
            // Redirect to your app with the code
            window.location.href = `fiscalpos://oauth/loyverse?code=${code}&state=${state}`;
        } else if (error) {
            // Handle error
            window.location.href = `fiscalpos://oauth/loyverse?error=${error}`;
        } else {
            document.body.innerHTML = '<p>Invalid OAuth response</p>';
        }
    </script>
</head>
<body>
    <p>Redirecting to FiscalPOS...</p>
</body>
</html>
